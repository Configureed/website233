<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BKA · License System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #000000, #0a0a0a);
            min-height: 100vh;
            color: #fff;
        }
        @keyframes fade-in { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 0.8s ease-out forwards; }
        .bg-black\/40 { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(12px); }
        .min-h-screen { min-height: 100vh; }
        .flex { display: flex; }
        .items-center { align-items: center; }
        .justify-center { justify-content: center; }
        .px-4 { padding-left: 1rem; padding-right: 1rem; }
        .w-full { width: 100%; }
        .max-w-md { max-width: 28rem; }
        .rounded-2xl { border-radius: 1rem; }
        .p-8 { padding: 2rem; }
        .border { border-width: 1px; }
        .border-white\/30 { border-color: rgba(255, 255, 255, 0.3); }
        .text-center { text-align: center; }
        .mb-8 { margin-bottom: 2rem; }
        .text-4xl { font-size: 2.25rem; }
        .font-bold { font-weight: 700; }
        .text-gray-400 { color: #9ca3af; }
        .space-y-6 > * + * { margin-top: 1.5rem; }
        .block { display: block; }
        .text-sm { font-size: 0.875rem; }
        .py-3 { padding-top: 0.75rem; padding-bottom: 0.75rem; }
        .rounded-lg { border-radius: 0.5rem; }
        .mt-4 { margin-top: 1rem; }
        .text-red-400 { color: #f87171; }
        .text-green-400 { color: #4ade80; }
        .btn-primary {
            background: linear-gradient(135deg, #ffffff, #e0e0e0);
            color: #000;
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            border: none;
            cursor: pointer;
            width: 100%;
        }
        .btn-primary:hover { transform: scale(1.02); }
        .input-field {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            color: white;
            outline: none;
        }
        .input-field:focus { border-color: white; }
        .logo-img { width: 100px; height: auto; }
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .dashboard-container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .stat-card {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 1rem;
            padding: 1.5rem;
        }
        .grid-layout { display: grid; gap: 1.5rem; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); }
        .badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 0.25rem 0.9rem;
            border-radius: 9999px;
            font-size: 0.7rem;
        }
        .badge-admin { background: linear-gradient(135deg, #c9a03d, #b8860b); color: #000; }
        @media (max-width: 768px) { .dashboard-container { padding: 1rem; } }
    </style>
</head>
<body>
    <div id="loadingOverlay" class="loading-overlay"><div class="spinner"></div></div>

    <div id="loginView">
        <div class="min-h-screen flex items-center justify-center px-4">
            <div class="w-full max-w-md">
                <div class="bg-black/40 backdrop-blur-md rounded-2xl p-8 border border-white/30 shadow-2xl animate-fade-in">
                    <div class="text-center mb-8">
                        <div class="flex justify-center mb-4">
                            <img src="https://files.catbox.moe/vpb8g7.png" alt="BKA" class="logo-img">
                        </div>
                        <h1 class="text-4xl font-bold mb-2">BKA</h1>
                        <p class="text-gray-400">license system</p>
                    </div>
                    <div class="space-y-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">License Key</label>
                            <input id="accessKeyInput" placeholder="XXXXX-XXXXX-XXXXX-XXXXX-XXXXX" class="input-field">
                        </div>
                        <button id="loginBtn" class="btn-primary">Authenticate</button>
                    </div>
                    <div id="loginError" class="mt-4 text-red-400 text-sm text-center" style="display: none;"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboardView" style="display: none;">
        <div class="dashboard-container">
            <div class="bg-black/40 backdrop-blur-md rounded-2xl p-6 border border-white/30 mb-6">
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <img src="https://files.catbox.moe/vpb8g7.png" alt="BKA" style="width: 52px;">
                        <div>
                            <h1 class="text-2xl font-bold">BKA</h1>
                            <p class="text-gray-400 text-sm">licensed system</p>
                        </div>
                    </div>
                    <div><span id="userRoleBadge" class="badge">USER</span></div>
                </div>
            </div>

            <div class="bg-black/40 backdrop-blur-md rounded-2xl p-6 border border-white/30 mb-6">
                <p>Welcome, <strong id="welcomeUsername" class="text-white">User</strong></p>
                <div class="flex justify-between mt-2 text-sm">
                    <span>License: <span id="activeKeyDisplay" class="text-cyan-300">***</span></span>
                    <span>Expires: <span id="expiryDisplay" class="text-yellow-300">-</span></span>
                </div>
            </div>

            <div class="grid-layout">
                <div class="stat-card">
                    <h3 class="font-bold mb-3">Loader Download</h3>
                    <a id="downloadLoaderLink" href="#" class="btn-primary text-center inline-block">download loader</a>
                </div>

                <div class="stat-card">
                    <h3 class="font-bold mb-3">VOIP Call</h3>
                    <input type="text" id="callNumberInput" placeholder="target number" class="input-field text-sm mb-2">
                    <button id="startCallBtn" class="btn-primary mb-2">start fake call</button>
                    <button id="stopCallBtn" class="btn-primary" style="background:#333;" disabled>stop call</button>
                    <div id="callStatus" class="text-xs text-gray-400 text-center mt-2">idle</div>
                </div>

                <div class="stat-card">
                    <h3 class="font-bold mb-3">Account</h3>
                    <input type="text" id="newUsername" placeholder="new username" class="input-field mb-2">
                    <button id="changeUsernameBtn" class="btn-primary">change username</button>
                    <div id="accountFeedback" class="text-xs text-gray-400 mt-2"></div>
                </div>
            </div>

            <div class="mt-6 text-center">
                <button id="logoutBtn" class="btn-primary" style="background:#8b0000;">logout</button>
            </div>
        </div>
    </div>

    <audio id="callAudio"><source src="https://files.catbox.moe/clyzoz.wav" type="audio/wav"></audio>

    <script>
        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? 'http://localhost:5001' 
            : 'https://YOUR_SERVER_IP:5001';
        const OWNER_KEY = "K7XM-9P42-3N8R-5V6W";
        
        let currentSession = { loggedIn: false, licenseKey: null, userData: null, expires: null };
        let activeCall = false;

        async function getClientIp() {
            try {
                let res = await fetch('https://api.ipify.org?format=json');
                let data = await res.json();
                return data.ip;
            } catch(e) { return 'unknown'; }
        }

        function showLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }

        async function validateKey(key, ip, username) {
            try {
                let res = await fetch(API_URL + '/validate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key: key, ip: ip, username: username })
                });
                return await res.json();
            } catch(e) {
                return { success: false, message: 'Server offline - bot not running' };
            }
        }

        async function login() {
            let key = document.getElementById('accessKeyInput').value.trim().toUpperCase();
            if (!key) { showError("Enter license key"); return; }
            showLoading(true);
            let ip = await getClientIp();
            let username = prompt("Enter username:", "user_" + Math.floor(Math.random() * 1000)) || "user";
            let result = await validateKey(key, ip, username);
            showLoading(false);
            
            if (result.success) {
                currentSession = {
                    loggedIn: true,
                    licenseKey: key,
                    userData: { username: username, type: key === OWNER_KEY ? 'admin' : 'user' },
                    expires: result.expires || 'active'
                };
                document.getElementById('loginView').style.display = 'none';
                document.getElementById('dashboardView').style.display = 'block';
                renderDashboard();
            } else {
                showError(result.message);
            }
        }

        function showError(msg) {
            let errDiv = document.getElementById('loginError');
            errDiv.innerHTML = msg;
            errDiv.style.display = 'block';
            setTimeout(() => errDiv.style.display = 'none', 4000);
        }

        function renderDashboard() {
            document.getElementById('welcomeUsername').innerHTML = currentSession.userData.username;
            document.getElementById('activeKeyDisplay').innerHTML = currentSession.licenseKey.substring(0, 15) + '...';
            document.getElementById('expiryDisplay').innerHTML = currentSession.expires;
            let isAdmin = currentSession.licenseKey === OWNER_KEY;
            document.getElementById('userRoleBadge').innerHTML = isAdmin ? 'ADMIN' : 'USER';
            if (isAdmin) document.getElementById('userRoleBadge').classList.add('badge-admin');
        }

        function startCall() {
            let target = document.getElementById('callNumberInput').value.trim();
            if (!target) { alert("Enter number"); return; }
            if (activeCall) return;
            activeCall = true;
            let audio = document.getElementById('callAudio');
            audio.play().catch(e => {});
            document.getElementById('callStatus').innerHTML = `Calling ${target}...`;
            document.getElementById('startCallBtn').disabled = true;
            document.getElementById('stopCallBtn').disabled = false;
            setTimeout(() => {
                if (activeCall) document.getElementById('callStatus').innerHTML = `Active call with ${target}`;
            }, 3000);
        }

        function stopCall() {
            if (!activeCall) return;
            activeCall = false;
            let audio = document.getElementById('callAudio');
            audio.pause();
            audio.currentTime = 0;
            document.getElementById('callStatus').innerHTML = "Call ended";
            document.getElementById('startCallBtn').disabled = false;
            document.getElementById('stopCallBtn').disabled = true;
            setTimeout(() => {
                if (document.getElementById('callStatus').innerHTML === "Call ended") {
                    document.getElementById('callStatus').innerHTML = "idle";
                }
            }, 2000);
        }

        function changeUsername() {
            let newName = document.getElementById('newUsername').value.trim();
            if (!newName || newName.length < 2) {
                document.getElementById('accountFeedback').innerHTML = "min 2 chars";
                return;
            }
            currentSession.userData.username = newName;
            document.getElementById('accountFeedback').innerHTML = "Username updated";
            renderDashboard();
            setTimeout(() => document.getElementById('accountFeedback').innerHTML = "", 2000);
        }

        function logout() {
            if (activeCall) stopCall();
            currentSession = { loggedIn: false };
            document.getElementById('dashboardView').style.display = 'none';
            document.getElementById('loginView').style.display = 'block';
            document.getElementById('accessKeyInput').value = '';
        }

        document.getElementById('loginBtn').onclick = login;
        document.getElementById('startCallBtn').onclick = startCall;
        document.getElementById('stopCallBtn').onclick = stopCall;
        document.getElementById('changeUsernameBtn').onclick = changeUsername;
        document.getElementById('logoutBtn').onclick = logout;
        document.getElementById('accessKeyInput').onkeypress = (e) => { if (e.key === 'Enter') login(); };
        
        console.log("BKA System Ready");
    </script>
</body>
</html>
